<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" width="100%" role="img" aria-label="Mohamed Alkhazindar — AI Engineer, Riyadh">
  <rect width="900" height="260" fill="#0d1117"/>

  <!-- ======================= detected name (left) ======================= -->
  <text x="64" y="128" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="44" font-weight="600" fill="#f0f6fc">Mohamed Alkhazindar</text>
  <text x="66" y="196" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="500" letter-spacing="4" fill="#9198a1">AI ENGINEER · RIYADH</text>

  <!-- scan line from robot toward the name -->
  <line x1="700" y1="118" x2="566" y2="120" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="3 6" opacity="0">
    <animate attributeName="opacity" values="0;0.8;0.2;0.8;0;0" keyTimes="0;0.02;0.04;0.06;0.083;1" dur="12s" repeatCount="indefinite"/>
  </line>

  <!-- corner brackets -->
  <g stroke="#22d3ee" stroke-width="2" fill="none" opacity="0">
    <path d="M38,98 L38,76 L60,76"/>
    <path d="M542,76 L564,76 L564,98"/>
    <path d="M38,142 L38,164 L60,164"/>
    <path d="M542,164 L564,164 L564,142"/>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.07;0.12;0.96;1" dur="12s" repeatCount="indefinite"/>
  </g>

  <!-- bounding box: draws itself on, un-draws at cycle end -->
  <rect x="46" y="84" width="510" height="72" fill="none" stroke="#22d3ee" stroke-width="1.5" pathLength="100" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100;100;0;0;100" keyTimes="0;0.083;0.2;0.96;1" dur="12s" repeatCount="indefinite"/>
  </rect>

  <!-- confidence label -->
  <g opacity="0">
    <rect x="46" y="62" width="112" height="22" fill="#22d3ee"/>
    <text x="56" y="78" font-family="ui-monospace, Consolas, 'Courier New', monospace" font-size="13" font-weight="600" fill="#0d1117">engineer 0.99</text>
    <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.2;0.24;0.96;1" dur="12s" repeatCount="indefinite"/>
  </g>

  <!-- ======================= robot (right) ======================= -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0;0 3;0 0" keyTimes="0;0.5;1" calcMode="spline" keySplines="0.42 0 0.58 1;0.42 0 0.58 1" dur="6s" repeatCount="indefinite"/>

    <!-- speech bubble -->
    <g opacity="0">
      <rect x="575" y="30" width="84" height="32" rx="10" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
      <path d="M645,61 L656,74 L628,61 Z" fill="#161b22" stroke="#6e7681" stroke-width="1.5" stroke-linejoin="round"/>
      <text x="617" y="52" text-anchor="middle" font-family="'Segoe UI', Tahoma, Arial, sans-serif" font-size="17" font-weight="600" fill="#22d3ee">مرحبًا</text>
      <animate attributeName="opacity" values="0;0;1;1;0" keyTimes="0;0.24;0.28;0.96;1" dur="12s" repeatCount="indefinite"/>
    </g>

    <!-- antenna -->
    <line x1="760" y1="62" x2="760" y2="40" stroke="#6e7681" stroke-width="3"/>
    <circle cx="760" cy="34" r="6" fill="#22d3ee">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>

    <!-- ears -->
    <rect x="644" y="105" width="16" height="44" rx="5" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
    <rect x="860" y="105" width="16" height="44" rx="5" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>

    <!-- head -->
    <rect x="660" y="62" width="200" height="130" rx="20" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>

    <!-- eyes: glance toward the name during the scan, blink on their own -->
    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 0;-9 0;-9 0;0 0;0 0" keyTimes="0;0.01;0.03;0.32;0.36;1" dur="12s" repeatCount="indefinite"/>
      <g transform="translate(720,115)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="1 1;1 1;1 0.08;1 1;1 1" keyTimes="0;0.9;0.93;0.96;1" dur="4.6s" begin="-1s" repeatCount="indefinite"/>
          <circle r="20" fill="#22d3ee" opacity="0.12"/>
          <circle r="13" fill="#22d3ee"/>
        </g>
      </g>
      <g transform="translate(800,115)">
        <g>
          <animateTransform attributeName="transform" type="scale" values="1 1;1 1;1 0.08;1 1;1 1" keyTimes="0;0.9;0.93;0.96;1" dur="4.6s" begin="-1s" repeatCount="indefinite"/>
          <circle r="20" fill="#22d3ee" opacity="0.12"/>
          <circle r="13" fill="#22d3ee"/>
        </g>
      </g>
    </g>

    <!-- mouth -->
    <circle cx="740" cy="168" r="3" fill="#6e7681"/>
    <circle cx="760" cy="168" r="3" fill="#6e7681"/>
    <circle cx="780" cy="168" r="3" fill="#6e7681"/>

    <!-- neck + shoulders -->
    <rect x="737" y="192" width="46" height="14" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
    <rect x="688" y="206" width="144" height="34" rx="14" fill="#161b22" stroke="#6e7681" stroke-width="1.5"/>
  </g>
</svg>
